<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DooOfficiall - TTQC Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ----- SEMUA WARNA DIUBAH KE BIRU DONGKER + NEON BLUE ----- */
        :root { 
            --bg-body: #0a0e17; 
            --bg-card: rgba(10, 14, 23, 0.85); 
            --border-card: rgba(0, 150, 255, 0.25); 
            --text-main: #e2e8f0; 
            --text-muted: #94a3b8; 
            --bg-input: #111827; 
            --border-input: #1e293b; 
            --shadow-card: 0 20px 60px rgba(0, 150, 255, 0.1); 
            --toggle-bg: #1e293b; 
            --toggle-border: #0096ff; 
            --toggle-text: #e2e8f0; 
            --error-bg: #1e1e2f; 
            --error-border: #ff4444; 
            --error-text: #ff6666;
            --primary-blue: #0096ff;
            --dark-navy: #0a0e17;
        }

        /* Dark mode (tetap sama, biar konsisten) */
        .dark { 
            --bg-body: #0a0e17; 
            --bg-card: rgba(10, 14, 23, 0.9); 
            --border-card: rgba(0, 150, 255, 0.3); 
            --text-main: #f1f5f9; 
            --text-muted: #94a3b8; 
            --bg-input: #111827; 
            --border-input: #1e293b; 
            --shadow-card: 0 20px 60px rgba(0, 150, 255, 0.2); 
            --toggle-bg: #1e293b; 
            --toggle-border: #0096ff; 
            --toggle-text: #f1f5f9; 
            --error-bg: #1e1e2f; 
            --error-border: #ff4444; 
            --error-text: #ff6666;
        }

        /* Light mode (kita ubah juga biar match, tapi tetap terang) */
        .light { 
            --bg-body: #f8fafc; 
            --bg-card: rgba(255, 255, 255, 0.85); 
            --border-card: rgba(0, 150, 255, 0.2); 
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --bg-input: #ffffff; 
            --border-input: #cbd5e1; 
            --shadow-card: 0 20px 60px rgba(0, 150, 255, 0.08); 
            --toggle-bg: #ffffff; 
            --toggle-border: #0096ff; 
            --toggle-text: #0f172a; 
            --error-bg: #fef2f2; 
            --error-border: #fecaca; 
            --error-text: #dc2626;
        }

        body { background-color: var(--bg-body); color: var(--text-main); transition: all 0.3s ease; }
        .glass-card { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-card); box-shadow: var(--shadow-card); transition: all 0.3s ease; }
        input, textarea { background-color: var(--bg-input) !important; border-color: var(--border-input) !important; color: var(--text-main) !important; transition: all 0.3s ease; }
        .theme-toggle { background: var(--toggle-bg); border: 1px solid var(--toggle-border); color: var(--toggle-text); }
        #errorMsg { background: var(--error-bg); border-color: var(--error-border); color: var(--error-text); }

        /* Scrollbar biru neon */
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; } 
        ::-webkit-scrollbar-thumb { background: #0096ff; border-radius: 10px; }

        /* Focus input — neon blue */
        input:focus, textarea:focus { 
            box-shadow: 0 0 0 3px rgba(0, 150, 255, 0.4); 
            border-color: #0096ff !important; 
        }

        /* Tombol toggle */
        .theme-toggle { 
            position: fixed; top: 20px; right: 20px; z-index: 50; 
            width: 48px; height: 48px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; cursor: pointer; 
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.2); 
            transition: all 0.3s ease; 
        }
        .theme-toggle:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 150, 255, 0.4); }

        /* Tombol Generate — biru neon */
        .btn-neon {
            background: linear-gradient(135deg, #0096ff, #0066cc);
            color: white;
            border: none;
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.3);
            transition: all 0.3s ease;
        }
        .btn-neon:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.5);
            background: linear-gradient(135deg, #00a6ff, #0077dd);
        }
        .btn-neon:active {
            transform: scale(0.98);
        }

        /* Icon & aksen biru */
        .text-neon { color: #0096ff; }
        .border-neon { border-color: #0096ff; }
        .bg-neon-glow { background: radial-gradient(circle, rgba(0,150,255,0.15) 0%, transparent 70%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative light">
    <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon" id="themeIcon"></i></button>
    
    <div class="glass-card max-w-md w-full rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Glow effect biru di belakang -->
        <div class="absolute -top-20 -right-20 w-64 h-64 bg-neon-glow rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-neon-glow rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center relative z-10 mb-8">
            <div class="inline-block p-3 bg-gradient-to-r from-[#0096ff] to-[#0066cc] rounded-2xl shadow-lg mb-3">
                <i class="fas fa-comment text-white text-3xl"></i>
            </div>
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-[#0096ff] to-[#00ccff] bg-clip-text text-transparent">
                DooOfficiall
            </h1>
            <p class="text-sm text-muted mt-1 font-medium">Generator Chat TikTok Otomatis</p>
        </div>

        <form id="formGenerate" class="space-y-5 relative z-10">
            <div>
                <label class="block text-sm font-semibold mb-1.5 text-muted">
                    <i class="fas fa-user text-neon mr-1"></i> Nama Pengguna
                </label>
                <input type="text" id="username" value="DooOfficiall" 
                       class="w-full rounded-xl px-4 py-3 outline-none border shadow-sm transition-all placeholder-gray-500">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1.5 text-muted">
                    <i class="fas fa-comment-dots text-neon mr-1"></i> Pesan Chat
                </label>
                <textarea id="chatText" rows="3" 
                          class="w-full rounded-xl px-4 py-3 outline-none border shadow-sm transition-all placeholder-gray-500 resize-none" 
                          placeholder="Tulis pesan di sini...">Just friend kok cemburu 😂😂</textarea>
            </div>
            
            <button type="submit" id="btnGenerate" class="btn-neon w-full font-bold py-3.5 rounded-xl flex items-center justify-center gap-2">
                <i class="fas fa-download"></i> Generate & Download
            </button>
        </form>

        <div id="loading" class="hidden text-center mt-5">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-[#0096ff] border-t-transparent"></div>
            <p class="text-[#0096ff] mt-2 font-medium">🔄 Memproses gambar...</p>
        </div>

        <div id="errorMsg" class="hidden text-center mt-4 p-3 rounded-xl border">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span id="errorText">Terjadi kesalahan</span>
        </div>

        <!-- FOOTER BARU -->
        <div class="mt-8 pt-4 border-t border-[#0096ff]/30 relative z-10">
            <div class="flex flex-col items-center gap-1 text-[10px] tracking-wide text-muted">
                <p class="text-gray-400 text-center">
                    Copyright © 2026 <span class="font-semibold text-[#0096ff]">DooOfficiall</span> - TTQC . All Rights Reserved
                </p>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const html = document.documentElement;
            let current = localStorage.getItem('theme') || 'light';
            
            function setTheme(t){
                if(t === 'dark'){
                    html.classList.remove('light');
                    html.classList.add('dark');
                    themeIcon.classList.remove('fa-moon');
                    themeIcon.classList.add('fa-sun');
                } else {
                    html.classList.remove('dark');
                    html.classList.add('light');
                    themeIcon.classList.remove('fa-sun');
                    themeIcon.classList.add('fa-moon');
                }
                localStorage.setItem('theme', t);
            }
            
            setTheme(current);
            
            themeToggle.addEventListener('click', ()=>{
                setTheme(html.classList.contains('dark') ? 'light' : 'dark');
            });

            document.getElementById('formGenerate').addEventListener('submit', async (e)=>{
                e.preventDefault();
                const btn = document.getElementById('btnGenerate');
                const load = document.getElementById('loading');
                const err = document.getElementById('errorMsg');
                const errText = document.getElementById('errorText');
                
                btn.disabled = true;
                load.classList.remove('hidden');
                err.classList.add('hidden');

                try {
                    const res = await fetch('/generate', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({ 
                            username: document.getElementById('username').value, 
                            chatText: document.getElementById('chatText').value 
                        })
                    });
                    if(!res.ok) throw new Error((await res.json()).message || 'Gagal');
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ttqc-${Date.now()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                } catch(e){
                    errText.textContent = '❌ Error: ' + e.message;
                    err.classList.remove('hidden');
                } finally {
                    btn.disabled = false;
                    load.classList.add('hidden');
                }
            });
        })();
    </script>
</body>
</html>
